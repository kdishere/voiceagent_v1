<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold">Clinician Dashboard</h2>
      <span class="text-muted">{{ today | date:'fullDate' }}</span>
    </div>
  
    <div class="row g-4">
      <div class="col-md-8">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white py-3"><h5 class="mb-0">Priority Alerts</h5></div>
          <div class="list-group list-group-flush">
            @for (p of patientService.patients(); track p.id) {
              @if (p.alerts && p.alerts.length > 0) {
                <div class="list-group-item d-flex justify-content-between align-items-center p-3">
                  <div>
                    <h6 class="mb-1 fw-bold text-danger">{{p.name}}</h6>
                    <p class="mb-0 small text-muted">{{p.alerts.join(', ')}}</p>
                  </div>
                  <button class="btn btn-sm btn-outline-success" (click)="patientService.initiateCall(p.phone)">
                    <i class="bi bi-telephone"></i> Call
                  </button>
                </div>
              }
            }
          </div>
        </div>
      </div>
  
      <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-header bg-white py-3"><h5 class="mb-0">Risk Distribution</h5></div>
          <div class="card-body">
            <div class="progress mb-3" style="height: 25px;">
              <div class="progress-bar bg-danger" role="progressbar" style="width: 33%">High</div>
              <div class="progress-bar bg-warning" role="progressbar" style="width: 33%">Med</div>
              <div class="progress-bar bg-success" role="progressbar" style="width: 34%">Low</div>
            </div>
            <p class="small text-muted text-center">Breakdown of current patient registry</p>
          </div>
        </div>
      </div>
    </div>
  </div>
